name: Build Kasir APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Init Project
        run: |
          printf 'com.bijul.kasirrmb\nKasir RMB\n\n\n\n' | bubblewrap init --manifest=https://kasir-rmb.pages.dev/manifest.json

      - name: Build APK
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kasir-RMB-APK
          path: app-release-signed.apk
          retention-days: 30
