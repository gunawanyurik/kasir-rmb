name: Build Kasir APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA Project
        run: |
          bubblewrap init --manifest=https://kasir-rmb.pages.dev/manifest.json \
          --directory=./twa \
          --packageId=com.bijul.kasirrmb \
          --name="Kasir RMB" \
          --launcherName="Kasir RMB" \
          --themeColor="#c0392b" \
          --backgroundColor="#fdf9f7" \
          --display=standalone \
          --orientation=portrait \
          --statusBarColor="#c0392b"

      - name: Build Release APK
        run: |
          cd twa
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kasir-RMB-APK
          path: twa/app-release-signed.apk
          retention-days: 30
